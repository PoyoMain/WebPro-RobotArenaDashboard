<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <title>RoboCorp - Battle Log</title>
</head>
<body>
    <nav>
        <div class="logo">RoboCorp</div>
        <div class="nav-links">
            <a href="homepage.html">Home</a>
            <a href="roster.html">Arena Roster</a>
            <a href="battlelog.html">Battle Log</a>
            <a href="controlpanel.html">Control Panel</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <h1>Battle Logs</h1>
        
        <table class="battle-table">
            <thead>
                <tr>
                    <th style="width: 50px;">#</th>
                    <th>Matchup</th>
                    <th style="width: 120px;">Duration</th>
                    <th style="width: 150px;">Date</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>
                        <div class="match-cell">
                            <div class="robot-info">
                                <span class="name">Raptor-X</span>
                                <span class="team">[Team Apex]</span>
                            </div>
                            <div class="score-display">
                                <span class="win-score">12</span>
                                <span class="score-divider">-</span>
                                <span class="loss-score">05</span>
                            </div>
                            <div class="robot-info">
                                <span class="name">Titan-01</span>
                                <span class="team">[Team Iron]</span>
                            </div>
                        </div>
                    </td>
                    <td>03:45</td>
                    <td>03-05-2026</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>
                        <div class="match-cell">
                            <div class="robot-info">
                                <span class="name">Glitch</span>
                                <span class="team">[Team Static]</span>
                            </div>
                            <div class="score-display">
                                <span class="win-score">08</span>
                                <span class="score-divider">-</span>
                                <span class="loss-score">07</span>
                            </div>
                            <div class="robot-info">
                                <span class="name">Scrapheap</span>
                                <span class="team">[Team Junkers]</span>
                            </div>
                        </div>
                    </td>
                    <td>05:00</td>
                    <td>03-04-2026</td>
                </tr>
            </tbody>
        </table>
    </div>

    <footer>
        &copy; 2026 RoboCorp | All Rights Reserved
    </footer>
</body>
</html>
